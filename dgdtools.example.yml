# dgdtools.yml -- shared configuration for dgdfmt and dgdlint.
# Place at your project root; every field is optional. The values below
# are a real working setup for a classic DGD mudlib (VikingMUD) and form
# a reasonable starting point for any DGD lib.

dialect:
  slash_slash: true          # // comments (DGD SLASHSLASH build flag)
  closures: false            # `function` keyword (DGD CLOSURES build flag)

root: lib                    # filesystem directory that is the lib's "/"

exclude:
  - "attic/**"               # retired code kept for reference
  - "**/old/**"
  - "**/OLD/**"
  - "**/.old/**"
  - "**/*.pre*"              # foo.preWizname.c-style parked copies
  - "**/*.retired"
  - "**/var/**"              # generated runtime data (maps, save state)

format:
  indent: 4
  line_endings: preserve     # preserve | lf | crlf
  max_blank_lines: 2
  function_headers: split    # split (KNF: name at column 0) | joined

lint:
  # Mirror the driver config (include dirs, forced include, auto object)
  # so #include and inherit macros resolve.
  include_dirs: ["/dgd/include", "/std/include"]
  include_file: "/dgd/include/Std.h"
  auto_objects: ["/dgd/lib/object"]

  # Identifiers accepted in specifier position (empty visibility macros).
  specifier_macros: [public]

  # Functions whose string argument names a callback on this_object();
  # call_other and call_out are built in. Value = 0-based argument index.
  call_registry:
    store_fp: 0
    add_action: 0

  # Functions taking a literal object path (clone_object, compile_object,
  # find_object are built in); value = 0-based argument index.
  object_registry: {}

  # scanf/printf-style functions and their format-string argument index;
  # sscanf (arg 1) is built in.
  format_registry: {}

  # Function/macro names marking an object as auto-saving.
  autosave_markers: [set_auto_save, D_STORE]

  # Lib-path globs served by virtual-object daemons (objects with no
  # backing .c file). Generated-data directories are usually better
  # handled with an exclude such as "**/var/**".
  virtual_paths: []

  # Rules run by their built-in defaults (see `dgdlint -rules`); enable
  # adds to the defaults, disable removes. The rules: section below only
  # tunes a rule's settings; listing one there does not enable it.
  enable: []
  disable: []
  rules:
    raw-inherit-path: { severity: warning, deny: ["/std/", "/obj/"] }
    lifecycle-chain: { names: [create] }
  path_rules:
    - paths: ["legacy/**"]
      disable: [lifecycle-chain]
  fail_on: error             # exit 1 at this severity or above
